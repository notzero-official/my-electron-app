name: Build macOS App

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm install --legacy-peer-deps

      - name: Build macOS
        run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/
